services:
  bridge:
    build: .
    container_name: alexa-hermes-bridge
    restart: unless-stopped
    network_mode: host # ホストのHermes API (127.0.0.1:8643) とcloudflared (127.0.0.1:3000) へそのまま到達させる
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro # devices.yaml（deviceId→entity対応表）

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host # 8123で待受 + Echo等のディスカバリ用
    environment:
      - TZ=Asia/Tokyo
    volumes:
      - ./homeassistant:/config
